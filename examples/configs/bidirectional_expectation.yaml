name: bidirectional_expectation
description: Association-backed top-down expectation prototype
modules:
  - id: low_level_fuzzy_art
    type: adapter
    adapter: fuzzy_art
    params:
      rho: 0.85
      alpha: 0.001
      beta: 1.0
  - id: high_level_fuzzy_art
    type: adapter
    adapter: fuzzy_art
    params:
      rho: 0.4
      alpha: 0.001
      beta: 1.0
edges:
  - source: low_level_fuzzy_art
    target: high_level_fuzzy_art
    type: BOTTOM_UP
    transform:
      name: selected_category_to_one_hot
      params:
        vector_size: 4
  - source: high_level_fuzzy_art
    target: low_level_fuzzy_art
    type: TOP_DOWN_EXPECTATION
    transform:
      name: high_category_to_expectation
associations: []
